<!doctype html>
<html lang="">
  <head>
    <title>Movable Ink</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/styles/index.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="app-title">Forecast Lookup</h1>

      <form class="zip-code-form" id="zip-code-form">
        <input
          type="text"
          name="zip-code-input"
          id="zip-code-input"
          class="zip-code-input"
          placeholder="Enter Zip Code"
          autocomplete="off"
          required
        />
        <button class="zip-code-button" type="submit">Get Forecast</button>
      </form>

      <section class="forecast-results" id="forecast-results" hidden></section>

      <p id="loading-message" class="loading-message" hidden>
        Loading forecast...
      </p>

      <p id="error-message" class="error-message" hidden></p>
    </main>
  </body>
  <script src="src/app.js"></script>
</html>
